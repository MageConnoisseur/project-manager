# Render Blueprint — optional; mirror these settings in the dashboard if needed.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: project-manager-api
    runtime: python
    plan: free
    # Use python3 explicitly — Render often does not provide a "python" command.
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173
