# Render Blueprint — optional; you can also set these in the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: project-manager-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Use "python -m uvicorn" so Render finds uvicorn inside the installed env
    # (the bare "uvicorn" command is often not on PATH after pip install).
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173
